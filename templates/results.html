{% extends "base.html" %}

{% block title %}Glint — Results{% endblock %}

{% block head %}
<style>
    body { align-items: flex-start; justify-content: flex-start; padding: 0; }

    .layout {
        display: flex;
        width: 100%;
        min-height: 100vh;
    }

    /* ── raw intel sidebar ── */
    .raw-panel {
        width: 280px;
        flex-shrink: 0;
        background: #050505;
        border-right: 1px solid #0d2b14;
        padding: 1rem 0.8rem;
        height: 100vh;
        position: sticky;
        top: 0;
        overflow-y: auto;
        font-size: 0.63rem;
        line-height: 1.5;
        scrollbar-width: thin;
        scrollbar-color: #0d2b14 #050505;
    }
    .raw-panel-title {
        color: #00cc33;
        font-size: 0.6rem;
        margin-bottom: 0.8rem;
        padding-bottom: 0.4rem;
        border-bottom: 1px solid #0d2b14;
    }

    /* accordion */
    details { margin-bottom: 0.2rem; }
    summary {
        list-style: none;
        cursor: pointer;
        padding: 0.3rem 0;
        color: #006622;
        font-size: 0.6rem;
        user-select: none;
        display: flex;
        align-items: center;
        gap: 0.4rem;
    }
    summary::-webkit-details-marker { display: none; }
    summary::before { content: "+"; color: #004d18; }
    details[open] > summary::before { content: "-"; }
    summary:hover { color: #00cc33; }

    .raw-badge { margin-left: auto; font-size: 0.55rem; color: #004d18; }
    .raw-badge.warn { color: #cc6600; }
    .raw-badge.ok   { color: #006622; }

    .raw-body { padding: 0.2rem 0 0.5rem 0.8rem; }
    .raw-line { color: #004d18; word-break: break-all; margin-bottom: 0.1rem; }
    .raw-key  { color: #006622; }
    .raw-val  { color: #004d18; }
    .raw-val-hi   { color: #00cc33; }
    .raw-val-warn { color: #cc6600; }
    .raw-val-dim  { color: #003311; }
    .raw-hash { color: #004d18; word-break: break-all; font-size: 0.58rem; }
    .raw-hash .raw-hash-hi { color: #006622; }
    .raw-divider { border: none; border-top: 1px solid #0d2b14; margin: 0.3rem 0; }
    .tri-match    { color: #006622; }
    .tri-mismatch { color: #cc6600; }
    .tri-unknown  { color: #004d18; }

    /* ── main report ── */
    .page {
        flex: 1;
        min-width: 0;
        padding: 2rem 2rem;
        font-size: 0.78rem;
        line-height: 1.6;
    }

    /* ── header ── */
    .case-header { margin-bottom: 2rem; }
    .case-meta { color: #006622; font-size: 0.68rem; margin-bottom: 0.2rem; }
    .case-id   { color: #00cc33; font-size: 0.72rem; }
    .threat-row {
        display: flex;
        align-items: baseline;
        gap: 2rem;
        margin-top: 1rem;
        padding-top: 0.8rem;
        border-top: 1px solid #0d2b14;
    }
    .threat-label { color: #006622; font-size: 0.62rem; margin-bottom: 0.2rem; }
    .threat-index { font-size: 2rem; font-weight: bold; line-height: 1; }
    .threat-class { font-size: 0.72rem; font-weight: bold; }

    /* ── sections ── */
    .section { margin-bottom: 2rem; }
    .section-head {
        display: flex;
        align-items: center;
        gap: 0.8rem;
        margin-bottom: 0.8rem;
        padding-bottom: 0.4rem;
        border-bottom: 1px solid #0d2b14;
    }
    .section-num  { color: #004d18; font-size: 0.65rem; }
    .section-name { color: #00cc33; font-size: 0.72rem; font-weight: bold; }
    .section-count { color: #004d18; font-size: 0.65rem; margin-left: auto; }

    /* ── dimensional table ── */
    .dim-table { width: 100%; border-collapse: collapse; }
    .dim-table td { padding: 0.25rem 0; vertical-align: middle; }
    .dim-table .col-name  { color: #00cc33; width: 130px; font-size: 0.72rem; }
    .dim-table .col-bar   { font-family: inherit; font-size: 0.72rem; padding: 0 0.8rem; }
    .dim-table .col-score { color: #00cc33; width: 50px; text-align: right; font-size: 0.72rem; }
    .dim-table .col-wt    { color: #004d18; width: 50px; text-align: right; font-size: 0.65rem; padding-left: 0.6rem; }
    .entropy-line {
        margin-top: 0.8rem;
        padding-top: 0.6rem;
        border-top: 1px solid #0d2b14;
        color: #006622;
        font-size: 0.65rem;
    }

    /* ── findings ── */
    .finding-entry { margin-bottom: 1.2rem; }
    .finding-head  { display: flex; align-items: baseline; gap: 0.8rem; margin-bottom: 0.2rem; }
    .finding-ref   { color: #004d18; font-size: 0.65rem; width: 2.5rem; flex-shrink: 0; }
    .finding-sev   { font-size: 0.65rem; font-weight: bold; width: 70px; flex-shrink: 0; }
    .finding-key   { color: #00cc33; font-size: 0.72rem; }
    .finding-title { color: #00cc33; font-size: 0.72rem; margin-left: 3.5rem; }
    .finding-desc  { color: #006622; font-size: 0.7rem; margin-left: 3.5rem; }
    .finding-evidence {
        color: #004d18;
        font-size: 0.67rem;
        margin-left: 3.5rem;
        margin-top: 0.2rem;
        white-space: pre-wrap;
        word-break: break-all;
    }

    .sev-CRITICAL { color: #e63636; }
    .sev-HIGH     { color: #cc6600; }
    .sev-MEDIUM   { color: #cccc00; }
    .sev-LOW      { color: #00cc33; }
    .sev-INFO     { color: #004d18; }

    /* ── hardening ── */
    .directive-entry { margin-bottom: 1.2rem; }
    .directive-head  { display: flex; align-items: baseline; gap: 0.8rem; margin-bottom: 0.2rem; }
    .directive-ref   { color: #004d18; font-size: 0.65rem; width: 2.5rem; flex-shrink: 0; }
    .directive-pri   { font-size: 0.65rem; font-weight: bold; width: 70px; flex-shrink: 0; }
    .directive-title { color: #00cc33; font-size: 0.72rem; }
    .directive-step  { color: #00cc33; font-size: 0.7rem; margin-left: 3.5rem; margin-top: 0.1rem; }
    .directive-step::before { content: "  "; }
    .directive-ref-link {
        color: #004d18;
        font-size: 0.65rem;
        margin-left: 3.5rem;
        margin-top: 0.2rem;
        display: block;
    }
    .directive-ref-link a { color: #004d18; }
    .directive-ref-link a:hover { color: #006622; }

    /* ── server intel ── */
    .intel-row {
        display: grid;
        grid-template-columns: 150px 1fr;
        gap: 0.1rem 0.8rem;
        font-size: 0.7rem;
        margin-bottom: 0.15rem;
    }
    .intel-key { color: #006622; }
    .intel-val { color: #00cc33; word-break: break-all; }

    /* ── misc ── */
    .loading { color: #006622; font-size: 0.75rem; padding: 3rem; text-align: center; }
    .error   { color: #e63636; font-size: 0.75rem; padding: 3rem; text-align: center; }
    .nav-links {
        margin-top: 2rem;
        padding-top: 0.8rem;
        border-top: 1px solid #0d2b14;
        display: flex;
        gap: 2rem;
        font-size: 0.68rem;
    }
    .nav-links a { color: #006622; }
    .nav-links a:hover { color: #00cc33; }
</style>
{% endblock %}

{% block content %}
<div class="layout">
    <div class="raw-panel" id="raw-panel">
        <div class="raw-panel-title">RAW INTEL</div>
        <div id="raw-content" style="color:#003311;font-size:0.62rem;">awaiting data...</div>
    </div>
    <div class="page">
        <div id="loading" class="loading">loading...</div>
        <div id="app" style="display:none;"></div>
    </div>
</div>

<script type="module">
const SCAN_ID = {{ scan_id | tojson }};
const BAR_WIDTH = 24;
const WEIGHTS = { network: 35, anonymity: 30, data_exposure: 25, ip_reputation: 10 };
const SEV_ORDER = { CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3, INFO: 4 };

async function load() {
    const loadingEl = document.getElementById("loading");
    const appEl     = document.getElementById("app");

    const response = await fetch("/api/scan/" + SCAN_ID);
    if (!response.ok) {
        loadingEl.className   = "error";
        loadingEl.textContent = "case file not found: " + SCAN_ID;
        return;
    }

    const data = await response.json();
    loadingEl.style.display = "none";
    appEl.style.display     = "block";
    appEl.innerHTML         = render(data);

    renderRawPanel(data);
}

function renderRawPanel(data) {
    const container = document.getElementById("raw-content");
    if (!container) return;

    const b   = (data.raw_payload || {}).browser || {};
    const obs = data.server_observed || {};
    const ip  = obs.ip_reputation || {};
    const hdr = obs.header_analysis || {};
    const nav = b.navigator || {};
    const scr = b.screen    || {};
    const wgl = b.webgl     || {};
    const wrt = b.webrtc    || {};

    function kv(k, v, cls) {
        if (v === undefined || v === null || v === "") return "";
        return `<div class="raw-line"><span class="raw-key">${esc(k)}</span>  <span class="${cls || "raw-val"}">${esc(String(v))}</span></div>`;
    }

    function hashLine(label, hash) {
        if (!hash) return "";
        const hi  = hash.slice(0, 8);
        const dim = hash.slice(8);
        return `<div class="raw-line"><span class="raw-key">${esc(label)}</span></div>
<div class="raw-hash"><span class="raw-hash-hi">${esc(hi)}</span>${esc(dim)}</div>`;
    }

    function section(title, badge, badgeCls, open, body) {
        const badgeHtml = badge
            ? `<span class="raw-badge ${badgeCls || ""}">${esc(badge)}</span>`
            : "";
        return `<details${open ? " open" : ""}>
<summary>${esc(title)}${badgeHtml}</summary>
<div class="raw-body">${body}</div>
</details>`;
    }

    // TRIANGULATION
    const tzNav  = nav.timezone;
    const tzIp   = ip.timezone;
    const tzMatch = tzNav && tzIp
        ? (tzNav === tzIp ? "match" : "mismatch")
        : "unknown";
    const tzCls = tzMatch === "match" ? "tri-match" : tzMatch === "mismatch" ? "tri-mismatch" : "tri-unknown";

    const langNav = nav.language ? nav.language.split("-")[0].toLowerCase() : null;
    const langHdr = hdr.lang_header ? hdr.lang_header.split("-")[0].toLowerCase() : null;
    const langMatch = langNav && langHdr
        ? (langNav === langHdr ? "match" : "mismatch")
        : "unknown";
    const langCls = langMatch === "match" ? "tri-match" : langMatch === "mismatch" ? "tri-mismatch" : "tri-unknown";

    const stunIp   = wrt.public_ip_via_stun;
    const serverIp = obs.remote_ip;
    const ipMatch  = stunIp && serverIp
        ? (stunIp === serverIp ? "match" : "mismatch — vpn bypass")
        : "unknown";
    const ipCls = ipMatch === "match" ? "tri-match" : ipMatch.startsWith("mismatch") ? "tri-mismatch" : "tri-unknown";

    const triBody = `
<div class="raw-line">timezone</div>
<div class="raw-line">  nav    <span class="raw-val-hi">${esc(tzNav || "—")}</span></div>
<div class="raw-line">  ip     <span class="raw-val-hi">${esc(tzIp  || "—")}</span></div>
<div class="raw-line">  → <span class="${tzCls}">${tzMatch}</span></div>
<hr class="raw-divider">
<div class="raw-line">language</div>
<div class="raw-line">  header <span class="raw-val-hi">${esc(hdr.lang_header || "—")}</span></div>
<div class="raw-line">  nav    <span class="raw-val-hi">${esc(nav.language || "—")}</span></div>
<div class="raw-line">  → <span class="${langCls}">${langMatch}</span></div>
<hr class="raw-divider">
<div class="raw-line">public ip</div>
<div class="raw-line">  stun   <span class="raw-val-hi">${esc(stunIp   || "—")}</span></div>
<div class="raw-line">  server <span class="raw-val-hi">${esc(serverIp || "—")}</span></div>
<div class="raw-line">  → <span class="${ipCls}">${ipMatch}</span></div>`;

    const triWarnings = [tzMatch, langMatch, ipMatch].filter(m => m.includes("mismatch")).length;

    // ENTROPY
    const entropyItems = [
        ["canvas",   b.canvas_blocked    ? 0 : 20],
        ["audio",    b.audio_blocked     ? 0 : 19],
        ["webgl",    wgl.webgl_blocked   ? 0 : (wgl.unmasked ? 17 : 8)],
        ["fonts",    b.fonts_blocked     ? 0 : Math.min(Math.round((b.font_count || 0) / 5), 15)],
        ["navigator",(nav.hardware_concurrency && nav.device_memory) ? 8 : 3],
        ["screen",   4],
    ];
    const totalEntropy = entropyItems.reduce((s, [, v]) => s + v, 0);
    const entropyBody  = entropyItems.map(([name, bits]) => {
        const bar = "█".repeat(Math.round(bits / 2)) + "░".repeat(10 - Math.round(bits / 2));
        return `<div class="raw-line"><span class="raw-key" style="display:inline-block;width:72px">${esc(name)}</span><span class="raw-val-dim">${bar}</span> <span class="raw-val-hi">${bits}</span></div>`;
    }).join("") + `<hr class="raw-divider"><div class="raw-line">total  <span class="raw-val-hi">${totalEntropy} bits</span></div>`;

    // CANVAS
    const canvasBody = b.canvas_blocked
        ? kv("status", "blocked", "raw-val-warn")
        : hashLine("sha256", b.canvas_hash) + kv("entropy", "~20 bits", "raw-val-dim");

    // AUDIO
    const audioBody = b.audio_blocked
        ? kv("status", "blocked", "raw-val-warn")
        : hashLine("sha256", b.audio_hash) + kv("entropy", "~19 bits", "raw-val-dim");

    // WEBGL
    const params     = wgl.parameters || {};
    const extensions = wgl.extensions || [];
    const paramLines = Object.entries(params)
        .map(([k, v]) => kv(k, Array.isArray(v) ? v.join(", ") : v)).join("");
    const extLines   = extensions.map(e => `<div class="raw-line raw-val-dim">${esc(e)}</div>`).join("");
    const webglBody  = wgl.webgl_blocked
        ? kv("status", "blocked", "raw-val-warn")
        : kv("vendor",       wgl.vendor)
        + kv("renderer",     wgl.renderer)
        + kv("version",      wgl.version)
        + kv("shading_lang", wgl.shading_lang)
        + kv("unmasked",     wgl.unmasked, wgl.unmasked ? "raw-val-warn" : "raw-val")
        + `<hr class="raw-divider">`
        + hashLine("precision_hash", wgl.precision_hash)
        + `<hr class="raw-divider">`
        + paramLines
        + (extensions.length ? `<hr class="raw-divider"><div class="raw-line raw-val-dim">extensions [${extensions.length}]</div>${extLines}` : "");

    // NAVIGATOR
    const langs = (nav.languages || []).join(", ");
    const navBody = kv("language",   nav.language)
        + kv("languages",  langs)
        + kv("platform",   nav.platform)
        + kv("concurrency",nav.hardware_concurrency)
        + kv("memory",     nav.device_memory ? nav.device_memory + " GB" : null)
        + kv("timezone",   nav.timezone)
        + kv("touch",      nav.max_touch_points)
        + kv("connection", nav.connection_type)
        + kv("plugins",    nav.plugin_count)
        + `<hr class="raw-divider">`
        + `<div class="raw-line raw-val-dim" style="word-break:break-all">${esc(nav.user_agent || "")}</div>`;

    // SCREEN
    const scrBody = kv("resolution", scr.screen_width + "×" + scr.screen_height)
        + kv("window",      scr.window_inner_width + "×" + scr.window_inner_height)
        + kv("color_depth", scr.color_depth)
        + kv("dpr",         scr.pixel_ratio)
        + kv("orientation", scr.orientation);

    // WEBRTC
    const localIps = wrt.local_ips || [];
    const ipLines  = localIps.map(entry => {
        const obj = typeof entry === "object" ? entry : { ip: entry, type: "?" };
        return `<div class="raw-line">  <span class="raw-val-warn">${esc(obj.ip)}</span> <span class="raw-val-dim">${esc(obj.type || "")}</span></div>`;
    }).join("");
    const webrtcBody = wrt.webrtc_blocked
        ? kv("status", "blocked", "raw-val")
        : (localIps.length
            ? `<div class="raw-line"><span class="raw-key">local_ips</span> <span class="raw-val-warn">[leak]</span></div>${ipLines}`
            : kv("local_ips", "none", "raw-val"))
        + kv("public_stun",    wrt.public_ip_via_stun)
        + kv("mdns_protected", wrt.mdns_protected);

    // FONTS
    const fonts     = b.fonts || [];
    const fontLines = fonts.map(f => `<div class="raw-line raw-val-dim">${esc(f)}</div>`).join("");
    const fontsBody = kv("count",   b.font_count)
        + kv("blocked", b.fonts_blocked)
        + `<hr class="raw-divider">${fontLines}`;

    // IP REPUTATION
    const ipRepBody = kv("ip",       obs.remote_ip)
        + kv("country",  ip.country)
        + kv("isp",      ip.isp)
        + kv("org",      ip.org)
        + kv("timezone", ip.timezone)
        + kv("is_proxy",   ip.is_proxy,   ip.is_proxy   ? "raw-val-warn" : "raw-val")
        + kv("is_hosting", ip.is_hosting, ip.is_hosting ? "raw-val-warn" : "raw-val");

    // HEADERS
    const hdrBody = kv("accept_language", hdr.accept_language)
        + kv("lang_header",    hdr.lang_header)
        + kv("lang_navigator", hdr.lang_navigator)
        + kv("mismatch",       hdr.lang_mismatch, hdr.lang_mismatch ? "raw-val-warn" : "raw-val")
        + `<hr class="raw-divider">`
        + `<div class="raw-line raw-val-dim" style="word-break:break-all">${esc(obs.user_agent || "")}</div>`;

    container.innerHTML =
        section("TRIANGULATION", triWarnings > 0 ? triWarnings + " mismatch" : "clean",
                triWarnings > 0 ? "warn" : "ok", true, triBody)
      + section("ENTROPY",     totalEntropy + " bits", "", false, entropyBody)
      + section("CANVAS",      b.canvas_blocked ? "blocked" : "ok", b.canvas_blocked ? "warn" : "ok", false, canvasBody)
      + section("AUDIO",       b.audio_blocked  ? "blocked" : "ok", b.audio_blocked  ? "warn" : "ok", false, audioBody)
      + section("WEBGL",       wgl.unmasked ? "unmasked" : wgl.webgl_blocked ? "blocked" : "masked",
                wgl.unmasked ? "warn" : "", false, webglBody)
      + section("NAVIGATOR",   "", "", false, navBody)
      + section("SCREEN",      "", "", false, scrBody)
      + section("WEBRTC",      localIps.length > 0 ? "leak" : wrt.webrtc_blocked ? "blocked" : "clean",
                localIps.length > 0 ? "warn" : "ok", false, webrtcBody)
      + section("FONTS",       (b.font_count || 0) + " detected", "", false, fontsBody)
      + section("IP REPUTATION", ip.is_proxy ? "proxy" : "", ip.is_proxy ? "warn" : "", false, ipRepBody)
      + section("HEADERS",     hdr.lang_mismatch ? "mismatch" : "", hdr.lang_mismatch ? "warn" : "", false, hdrBody);
}

function scoreColor(s) {
    if (s >= 76) return "#e63636";
    if (s >= 51) return "#cc6600";
    if (s >= 26) return "#cccc00";
    return "#00cc33";
}

function asciiBar(score) {
    const filled = Math.round((score / 100) * BAR_WIDTH);
    return "█".repeat(filled) + "░".repeat(BAR_WIDTH - filled);
}

function esc(s) {
    return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
}

function renderSection(num, name, count, content) {
    const countStr = count !== null ? `[${count}]` : "";
    return `
<div class="section">
    <div class="section-head">
        <span class="section-num">section ${String(num).padStart(2,"0")}</span>
        <span class="section-name">${name}</span>
        ${countStr ? `<span class="section-count">${countStr}</span>` : ""}
    </div>
    ${content}
</div>`;
}

function renderDimensions(data) {
    const dimMap = {};
    for (const d of data.dimensions) dimMap[d.name] = d.score;

    const order  = ["network","anonymity","data_exposure","ip_reputation"];
    const labels = { network: "network", anonymity: "anonymity",
                     data_exposure: "data exposure", ip_reputation: "ip reputation" };

    const rows = order.map(name => {
        const score = dimMap[name] ?? 0;
        const color = scoreColor(score);
        const wt    = WEIGHTS[name];
        return `<tr>
            <td class="col-name">${labels[name]}</td>
            <td class="col-bar" style="color:${color}">${asciiBar(score)}</td>
            <td class="col-score" style="color:${color}">${score}</td>
            <td class="col-wt">wt ${wt}%</td>
        </tr>`;
    }).join("");

    return `
<table class="dim-table">${rows}</table>
<div class="entropy-line">
    identity entropy: ${data.identity_entropy_score.toFixed(1)} bits
</div>`;
}

function renderFindings(findings) {
    if (!findings || findings.length === 0) {
        return '<div style="color:#006622;font-size:0.7rem;">no findings recorded</div>';
    }
    const sorted = [...findings].sort(
        (a, b) => (SEV_ORDER[a.severity] ?? 99) - (SEV_ORDER[b.severity] ?? 99)
    );
    return sorted.map((f, i) => {
        const ref = `[${String(i + 1).padStart(2,"0")}]`;
        const evidenceStr = f.evidence && Object.keys(f.evidence).length > 0
            ? esc(JSON.stringify(f.evidence))
            : "";
        return `
<div class="finding-entry">
    <div class="finding-head">
        <span class="finding-ref">${ref}</span>
        <span class="finding-sev sev-${f.severity}">${f.severity}</span>
        <span class="finding-key" translate="no">${esc(f.finding_key)}</span>
    </div>
    <div class="finding-title">${esc(f.title)}</div>
    <div class="finding-desc">${esc(f.description)}</div>
    ${evidenceStr ? `<div class="finding-evidence">${evidenceStr}</div>` : ""}
</div>`;
    }).join("");
}

function renderHardening(recs) {
    if (!recs || recs.length === 0) {
        return '<div style="color:#006622;font-size:0.7rem;">no directives</div>';
    }
    return recs.map((r, i) => {
        const ref   = `[${String(i + 1).padStart(2,"0")}]`;
        const steps = r.steps.map(s => `<div class="directive-step">${esc(s)}</div>`).join("");
        const refs  = (r.references || []).map(
            u => `<span class="directive-ref-link"><a href="${esc(u)}" target="_blank" rel="noopener">${esc(u)}</a></span>`
        ).join("");
        return `
<div class="directive-entry">
    <div class="directive-head">
        <span class="directive-ref">${ref}</span>
        <span class="directive-pri sev-${r.priority}">${r.priority}</span>
        <span class="directive-title">${esc(r.title)}</span>
    </div>
    ${steps}${refs}
</div>`;
    }).join("");
}

function renderIntel(obs) {
    if (!obs) return "";
    const ip  = obs.ip_reputation || {};
    const hdr = obs.header_analysis || {};
    const rows = [
        ["remote_ip",   obs.remote_ip],
        ["user_agent",  obs.user_agent],
        ["country",     ip.country],
        ["isp",         ip.isp],
        ["timezone",    ip.timezone],
        ["is_proxy",    ip.is_proxy],
        ["is_hosting",  ip.is_hosting],
        ["accept_lang", hdr.accept_language],
        ["lang_match",  hdr.lang_mismatch ? "mismatch" : "ok"],
    ].filter(([, v]) => v !== undefined && v !== null && v !== "");

    return rows.map(([k, v]) => `
<div class="intel-row">
    <span class="intel-key">${k}</span>
    <span class="intel-val">${esc(String(v))}</span>
</div>`).join("");
}

function render(data) {
    const color     = scoreColor(data.composite_score);
    const ts        = new Date().toISOString().replace("T", " ").slice(0, 19) + "Z";
    const obs       = data.server_observed || {};
    const findCount = (data.findings || []).filter(f => f.severity !== "INFO").length;
    const recCount  = (data.recommendations || []).length;

    return `
<div class="case-header">
    <div class="case-meta">case file</div>
    <div class="case-id" translate="no">${data.scan_id}</div>
    <div class="case-meta" style="margin-top:0.1rem;">${ts} · ${esc(obs.remote_ip || "unknown")}</div>
    <div class="threat-row">
        <div>
            <div class="threat-label">threat index</div>
            <div class="threat-index" style="color:${color}">${data.composite_score.toFixed(2)}</div>
        </div>
        <div>
            <div class="threat-label">classification</div>
            <div class="threat-class" style="color:${color}">${data.risk_level}</div>
        </div>
    </div>
</div>

${renderSection(1, "dimensional analysis", null, renderDimensions(data))}
${renderSection(2, "findings", findCount, renderFindings(data.findings || []))}
${renderSection(3, "hardening directives", recCount, renderHardening(data.recommendations || []))}
${renderSection(4, "server intelligence", null, renderIntel(obs))}

<div class="nav-links">
    <a href="/">← new scan</a>
    <a href="/history">case history</a>
    <a href="/api/scan/${data.scan_id}/export" download>export report</a>
</div>`;
}

load();
</script>
{% endblock %}
