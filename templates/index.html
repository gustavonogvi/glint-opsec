{% extends "base.html" %}

{% block title %}Glint — Scan{% endblock %}

{% block content %}
<div style="text-align: center; width: 100%; max-width: 620px;">
<pre translate="no" style="color: #00cc33; font-size: 0.8rem; line-height: 1.3; margin-bottom: 1.2rem; text-align: left; display: inline-block;">
  ___  _     _       _
 / __|| |   (_) _ _ | |_
| (_ || |__ | || ' \|  _|
 \___||____||_||_||_|\__|</pre>

    <p style="color: #006622; font-size: 0.72rem; margin-bottom: 2rem;">
        identity entropy scanner
    </p>

    <div id="email-form" style="margin-bottom: 1.2rem;">
        <label style="display: block; color: #006622; font-size: 0.72rem; margin-bottom: 0.4rem; text-align: left;">
            email (optional) — check for breach exposure
        </label>
        <div style="display: flex; gap: 0.6rem;">
            <input id="email-input" type="email" placeholder="you@example.com"
                style="flex: 1; background: #000; border: 1px solid #0d2b14; color: #00cc33;
                       padding: 0.5rem 0.7rem; font-family: monospace; font-size: 0.82rem; outline: none;">
            <button id="scan-btn"
                style="background: #000; border: 1px solid #00cc33; color: #00cc33;
                       padding: 0.5rem 1rem; font-family: monospace; font-size: 0.82rem;
                       cursor: pointer;">
                [ scan ]
            </button>
        </div>
    </div>

    <div id="log-area" style="display: none; background: #000; border: 1px solid #0d2b14; padding: 1.2rem; text-align: left; height: 180px; overflow-y: auto; margin-bottom: 1.2rem;">
        <div id="logs" style="font-size: 0.78rem; color: #00cc33;"></div>
    </div>

    <p id="scan-status" style="color: #006622; font-size: 0.82rem;">
        [ ready ]
    </p>
</div>

<script type="module" src="/static/js/core/submit.js"></script>
{% endblock %}
