{% extends "base.html" %}

{% block title %}Glint — Case History{% endblock %}

{% block head %}
<style>
    body { align-items: flex-start; justify-content: flex-start; padding: 2rem; }

    .page { width: 100%; max-width: 820px; margin: 0 auto; font-size: 0.78rem; }

    .header {
        margin-bottom: 1.5rem;
        padding-bottom: 0.8rem;
        border-bottom: 1px solid #0d2b14;
    }
    .header-meta  { color: #006622; font-size: 0.68rem; margin-bottom: 0.2rem; }
    .header-title { color: #00cc33; font-size: 0.72rem; font-weight: bold; }

    .section-head {
        display: flex;
        align-items: center;
        gap: 0.8rem;
        margin-bottom: 1rem;
        padding-bottom: 0.4rem;
        border-bottom: 1px solid #0d2b14;
    }
    .section-num   { color: #004d18; font-size: 0.65rem; }
    .section-name  { color: #00cc33; font-size: 0.72rem; font-weight: bold; }
    .section-count { color: #004d18; font-size: 0.65rem; margin-left: auto; }

    table { width: 100%; border-collapse: collapse; }

    th {
        text-align: left;
        color: #006622;
        font-size: 0.65rem;
        padding: 0 1rem 0.5rem 0;
        border-bottom: 1px solid #0d2b14;
        font-weight: normal;
    }
    td {
        padding: 0.4rem 1rem 0.4rem 0;
        border-bottom: 1px solid #0d2b14;
        color: #00cc33;
        font-size: 0.72rem;
        vertical-align: middle;
    }
    tr:hover td { background: #0d0d0d; }

    .col-ref  { color: #004d18; font-size: 0.65rem; width: 2rem; }
    .col-id a { color: #00cc33; }
    .col-id a:hover { color: #00ff41; }
    .col-date { color: #006622; font-size: 0.68rem; }
    .col-ip   { color: #006622; font-size: 0.68rem; }
    .col-score { font-weight: bold; }

    .risk-CRITICAL { color: #e63636; }
    .risk-HIGH     { color: #cc6600; }
    .risk-MEDIUM   { color: #cccc00; }
    .risk-LOW      { color: #00cc33; }

    .empty { color: #006622; font-size: 0.72rem; padding: 2rem 0; }
    .error { color: #e63636; font-size: 0.72rem; padding: 2rem 0; }

    .nav-links {
        margin-top: 1.5rem;
        padding-top: 0.8rem;
        border-top: 1px solid #0d2b14;
        display: flex;
        gap: 2rem;
        font-size: 0.68rem;
    }
    .nav-links a { color: #006622; }
    .nav-links a:hover { color: #00cc33; }
</style>
{% endblock %}

{% block content %}
<div class="page">
    <div class="header">
        <div class="header-meta">archive</div>
        <div class="header-title">case history</div>
    </div>

    <div id="content"><p class="empty">loading...</p></div>

    <div class="nav-links">
        <a href="/">← new scan</a>
    </div>
</div>

<script type="module">
async function load() {
    const container = document.getElementById("content");

    const response = await fetch("/api/scans");
    if (!response.ok) {
        container.innerHTML = '<p class="error">failed to retrieve archive</p>';
        return;
    }

    const scans = await response.json();

    if (scans.length === 0) {
        container.innerHTML = '<p class="empty">no cases on record</p>';
        return;
    }

    const rows = scans.map((s, i) => {
        const ref   = String(i + 1).padStart(2, "0");
        const date  = new Date(s.created_at).toISOString().replace("T", " ").slice(0, 19) + "Z";
        const short = s.scan_id.slice(0, 8) + "…" + s.scan_id.slice(-4);
        return `<tr>
            <td class="col-ref">[${esc(ref)}]</td>
            <td class="col-id"><a href="/results/${esc(s.scan_id)}" translate="no">${esc(short)}</a></td>
            <td class="col-date">${esc(date)}</td>
            <td class="col-ip">${esc(s.ip_address)}</td>
            <td class="col-score risk-${esc(s.risk_level)}">${esc(s.composite_score.toFixed(2))}</td>
            <td class="risk-${esc(s.risk_level)}">${esc(s.risk_level)}</td>
        </tr>`;
    }).join("");

    container.innerHTML = `
<div class="section-head">
    <span class="section-num">section 01</span>
    <span class="section-name">case log</span>
    <span class="section-count">[${scans.length} records]</span>
</div>
<table>
    <thead>
        <tr>
            <th></th>
            <th>case id</th>
            <th>assessed</th>
            <th>subject ip</th>
            <th>index</th>
            <th>class</th>
        </tr>
    </thead>
    <tbody>${rows}</tbody>
</table>`;
}

function esc(str) {
    return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
}

load();
</script>
{% endblock %}
